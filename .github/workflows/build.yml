name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build app
        run: npm run build

      - name: Verify robots.txt route
        run: node -e "const fs=require('fs'); const s=fs.readFileSync('build/server/index.js','utf8'); if(!s.includes('robots.txt')) process.exit(1); console.log('robots.txt route OK');"

      - name: Verify public files
        run: test -f public/robots.txt && test -f public/sitemap.xml && test -f server.mjs

      - name: Verify server.mjs starts
        run: |
          node server.mjs &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:3000/robots.txt | grep -q "Disallow"
          curl -sf http://localhost:3000/health | grep -q '"ok":true'
          kill "$SERVER_PID" || true

  trigger-easypanel:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Disparar deploy no Easypanel
        env:
          WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::warning::Secret EASYPANEL_DEPLOY_WEBHOOK não configurado. Configure em GitHub → Settings → Secrets."
            exit 0
          fi
          curl -sf -X POST "$WEBHOOK"
          echo "Deploy Easypanel disparado."
